openapi: 3.0.3
info:
  title: TaskFlow API
  description: |
    Full-stack Project & Task Management Platform API.
    
    ## Authentication
    Most endpoints require a JWT access token in the `Authorization: Bearer <token>` header.
    
    ## Roles
    - **ADMIN** — Full access to all resources
    - **PROJECT_MANAGER** — Manage own projects and their tasks
    - **TEAM_MEMBER** — Manage assigned tasks only
  version: 1.0.0
  contact:
    name: TaskFlow Team

servers:
  - url: http://localhost:5000/api
    description: Development server

tags:
  - name: Auth
    description: Authentication & registration
  - name: Users
    description: User management (Admin only)
  - name: Projects
    description: Project CRUD & membership
  - name: Tasks
    description: Task CRUD, status, subtasks, labels
  - name: Comments
    description: Task comments
  - name: Labels
    description: Project labels
  - name: Dashboard
    description: Dashboard statistics
  - name: Activity
    description: Activity audit log
  - name: Notifications
    description: User notifications
  - name: Attachments
    description: File attachments

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (15min expiry)

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, PROJECT_MANAGER, TEAM_MEMBER]
        isActive:
          type: boolean
        isVerified:
          type: boolean
        avatar:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, COMPLETED, ON_HOLD]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        ownerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, URGENT]
        dueDate:
          type: string
          format: date-time
          nullable: true
        projectId:
          type: string
          format: uuid
        assigneeId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        taskId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Label:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
        projectId:
          type: string
          format: uuid

    Subtask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isCompleted:
          type: boolean
        taskId:
          type: string
          format: uuid

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [ASSIGNED, COMMENTED, DUE_SOON, STATUS_CHANGED]
        message:
          type: string
        read:
          type: boolean
        link:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        taskId:
          type: string
          format: uuid
        uploadedById:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    ActivityLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [CREATED, UPDATED, DELETED, STATUS_CHANGED, COMMENTED]
        entityType:
          type: string
          enum: [TASK, PROJECT, COMMENT]
        entityId:
          type: string
          format: uuid
        changes:
          type: object
          nullable: true
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

paths:
  /health:
    get:
      tags: [Auth]
      summary: Health check
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                  description: "Must contain 1 uppercase letter and 1 number"
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '409':
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
        '403':
          description: Email not verified

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          description: Invalid refresh token

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    put:
      tags: [Auth]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /auth/password:
    put:
      tags: [Auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated
        '401':
          description: Current password incorrect

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset link sent (if email exists)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successfully
        '401':
          description: Invalid or expired token

  /auth/verify-email/{token}:
    get:
      tags: [Auth]
      summary: Verify email address
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
        '401':
          description: Invalid or expired token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out

  /users:
    get:
      tags: [Users]
      summary: List all users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [ADMIN, PROJECT_MANAGER, TEAM_MEMBER]
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '403':
          description: Admin only

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
    put:
      tags: [Users]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, PROJECT_MANAGER, TEAM_MEMBER]
                isActive:
                  type: boolean
      responses:
        '200':
          description: User updated
        '404':
          description: User not found
    delete:
      tags: [Users]
      summary: Delete (deactivate) user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deactivated
        '404':
          description: User not found

  /projects:
    get:
      tags: [Projects]
      summary: List projects
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, ON_HOLD]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated projects
    post:
      tags: [Projects]
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, startDate]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 200
                description:
                  type: string
                  maxLength: 2000
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [ACTIVE, COMPLETED, ON_HOLD]
      responses:
        '201':
          description: Project created

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
        '403':
          description: Not a member
        '404':
          description: Project not found
    put:
      tags: [Projects]
      summary: Update project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [ACTIVE, COMPLETED, ON_HOLD]
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '200':
          description: Project updated
    delete:
      tags: [Projects]
      summary: Delete project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project deleted

  /projects/{id}/members:
    post:
      tags: [Projects]
      summary: Add member to project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                role:
                  type: string
                  default: member
      responses:
        '201':
          description: Member added
        '409':
          description: User is already a member

  /projects/{id}/members/{userId}:
    delete:
      tags: [Projects]
      summary: Remove member from project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member removed

  /projects/{projectId}/tasks:
    get:
      tags: [Tasks]
      summary: List project tasks
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE]
        - name: priority
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, URGENT]
        - name: assigneeId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated tasks
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 2
                  maxLength: 200
                description:
                  type: string
                  maxLength: 5000
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH, URGENT]
                  default: MEDIUM
                dueDate:
                  type: string
                  format: date-time
                assigneeId:
                  type: string
                labelIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details with subtasks, labels, comments
    put:
      tags: [Tasks]
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH, URGENT]
                dueDate:
                  type: string
                  format: date-time
                assigneeId:
                  type: string
                labelIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Task updated
    delete:
      tags: [Tasks]
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted

  /tasks/{id}/status:
    patch:
      tags: [Tasks]
      summary: Update task status
      security:
        - bearerAuth: []
      description: |
        Linear workflow: TODO → IN_PROGRESS → IN_REVIEW → DONE
        
        - ADMIN can skip stages
        - Others must follow linear progression
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE]
      responses:
        '200':
          description: Status updated
        '400':
          description: Cannot skip stages

  /tasks/{id}/subtasks:
    post:
      tags: [Tasks]
      summary: Add subtask
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
      responses:
        '201':
          description: Subtask created

  /tasks/{id}/subtasks/{subtaskId}:
    patch:
      tags: [Tasks]
      summary: Toggle subtask completion
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: subtaskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isCompleted]
              properties:
                isCompleted:
                  type: boolean
      responses:
        '200':
          description: Subtask updated
    delete:
      tags: [Tasks]
      summary: Delete subtask
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: subtaskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subtask deleted

  /tasks/{id}/labels:
    post:
      tags: [Tasks]
      summary: Add label to task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labelId]
              properties:
                labelId:
                  type: string
      responses:
        '201':
          description: Label added
    delete:
      tags: [Tasks]
      summary: Remove label from task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: labelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Label removed

  /tasks/{id}/comments:
    get:
      tags: [Comments]
      summary: Get task comments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated comments
    post:
      tags: [Comments]
      summary: Add comment to task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 2000
      responses:
        '201':
          description: Comment added

  /tasks/{id}/comments/{commentId}:
    put:
      tags: [Comments]
      summary: Update comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Comment updated
        '403':
          description: Not comment author
    delete:
      tags: [Comments]
      summary: Delete comment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comment deleted
        '403':
          description: Not author or admin

  /projects/{projectId}/labels:
    get:
      tags: [Labels]
      summary: List project labels
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
